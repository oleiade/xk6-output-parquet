# Demo compose file. Replace the `parquet` service with your real destination
# (e.g. an influxdb, prometheus, otel-collector, mock-server) and uncomment the
# `k6` service to run a sample test end-to-end.

services:
  parquet:
    image: traefik/whoami:latest
    ports:
      - "9999:80"

  # Uncomment after `make build` to run a sample test through the extension.
