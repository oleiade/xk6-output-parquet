name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -cover -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        if: matrix.go == '1.23'
        with:
          name: coverage
          path: coverage.out

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build:
    name: xk6 build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Install xk6
        run: go install go.k6.io/xk6/cmd/xk6@latest
      - name: Build k6 with this extension
        run: xk6 build --with $(go list -m)=.
      - name: Smoke test
        run: ./k6 run --iterations 1 --quiet --no-summary samples/script.js -o xk6-parquet=http://127.0.0.1:9999 || true
